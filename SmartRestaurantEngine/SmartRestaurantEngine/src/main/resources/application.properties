spring.application.name=SmartRestaurantEngine

# SQL Database configuration
#spring.datasource.url=jdbc:mysql://localhost:3306/your_sql_db
#spring.datasource.username=root
#spring.datasource.password=yourpassword
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.jpa.hibernate.ddl-auto=update
server.port=4000

# MongoDB Atlas configuration
#spring.data.mongodb.uri=

#For Docker mongo configuration to be used with application running in local
#spring.data.mongodb.uri=mongodb://localhost:27017/restaurant_JavaReact

#For Docker mongo configuration to be used with application running in Docker container
spring.data.mongodb.uri=mongodb://mongodb:27017/restaurant_JavaReact

jwt.secret=MyVeryStrongJwtSecretKeyThatIsAtLeast32Chars
jwt.expirationMs=900000

# ===============================
# Redis Configuration
# ===============================
spring.data.redis.host=redis
spring.data.redis.port=6379

# ===============================
# Cache Configuration
# ===============================
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
